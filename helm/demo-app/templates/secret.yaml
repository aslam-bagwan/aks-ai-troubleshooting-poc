# Interim secrets story — AGENT_CONTEXT.md assumption A06.
#
# This K8s Secret is populated from .Values.app.secret.
# The default value "REPLACE_ME" is a placeholder — never a real secret.
# Operators pass the real value at deploy time via:
#   helm upgrade --install demo-app ./helm/demo-app --set app.secret=<value>
# The real value is NOT committed to version control.
#
# TODO (future phase): Replace this template with the Azure Key Vault CSI driver
#   (secrets-store-csi-driver) and a SecretProviderClass resource, removing the
#   need to pass secrets via Helm values entirely.
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "demo-app.fullname" . }}-secret
  labels:
    {{- include "demo-app.labels" . | nindent 4 }}
type: Opaque
data:
  app-secret: {{ .Values.app.secret | b64enc | quote }}
